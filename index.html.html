document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,.05),transparent);padding:26px;border-radius:6px;transition:.4s;\" style-hover=\"border-color:var(--neon,#ff4d1c);transform:translateY(-6px);\">\n        <div style=\"position:relative;height:260px;margin-bottom:20px;\">\n          <div style=\"position:absolute;inset:8% 14%;background:radial-gradient(circle,rgba(var(--glow,255,77,28),.6),transparent 70%);filter:blur(30px);\"><\u002Fdiv>\n          <image-slot id=\"shop-magma\" fit=\"contain\" shape=\"rounded\" radius=\"12\" placeholder=\"DROP · MAGMA\" style=\"position:relative;width:100%;height:100%;\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif;font-size:26px;letter-spacing:1px;\">ECHO·01 MAGMA<\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:14px;\">\n          <span style=\"font-family:'Chakra Petch',monospace;font-size:16px;color:var(--neon,#ff4d1c);\">$369<\u002Fspan>\n          <button style=\"font-family:'Chakra Petch',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:var(--neon,#ff4d1c);color:#000;border:1px solid var(--neon,#ff4d1c);padding:10px 18px;border-radius:2px;cursor:pointer;transition:.3s;\" style-hover=\"filter:brightness(1.15)\">Add to bag<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);padding:26px;border-radius:6px;transition:.4s;\" style-hover=\"border-color:var(--neon,#ff4d1c);transform:translateY(-6px);\">\n        <div style=\"position:relative;height:260px;margin-bottom:20px;\">\n          <div style=\"position:absolute;inset:8% 14%;background:radial-gradient(circle,rgba(var(--glow,255,77,28),.4),transparent 70%);filter:blur(28px);\"><\u002Fdiv>\n          <image-slot id=\"shop-frost\" fit=\"contain\" shape=\"rounded\" radius=\"12\" placeholder=\"DROP · FROST\" style=\"position:relative;width:100%;height:100%;\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif;font-size:26px;letter-spacing:1px;\">ECHO·01 FROST<\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:14px;\">\n          <span style=\"font-family:'Chakra Petch',monospace;font-size:16px;color:var(--neon,#ff4d1c);\">$349<\u002Fspan>\n          <button style=\"font-family:'Chakra Petch',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.35);padding:10px 18px;border-radius:2px;cursor:pointer;transition:.3s;\" style-hover=\"background:var(--neon,#ff4d1c);border-color:var(--neon,#ff4d1c);color:#000;\">Add to bag<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- big footer wordmark -->\n    <div style=\"margin-top:clamp(80px,14vh,160px);text-align:center;overflow:hidden;\">\n      <div style=\"font-family:'Anton',sans-serif;font-size:clamp(80px,22vw,340px);line-height:.8;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.14);letter-spacing:2px;\">NOVA<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;border-top:1px solid rgba(255,255,255,.08);padding:26px 0 34px;margin-top:20px;font-family:'Chakra Petch',monospace;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.45);\">\n      <span>© 2026 NOVA AUDIO AG<\u002Fspan>\n      <div style=\"display:flex;gap:22px;flex-wrap:wrap;\"><span>TERMS &amp; CONDITIONS<\u002Fspan><span>PRIVACY<\u002Fspan><span>COOKIES<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- variant switcher -->\n  <div style=\"position:fixed;bottom:22px;right:22px;z-index:130;display:flex;align-items:center;gap:10px;background:rgba(10,10,14,.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:40px;padding:8px 12px;\">\n    <span style=\"font-family:'Chakra Petch',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.5);margin-right:2px;\">THEME<\u002Fspan>\n    <button onclick=\"{{ pickA }}\" title=\"Ignition\" style=\"width:26px;height:26px;border-radius:50%;border:2px solid {{ ringA }};background:#ff4d1c;cursor:pointer;box-shadow:0 0 10px rgba(255,77,28,.6);padding:0;\"><\u002Fbutton>\n    <button onclick=\"{{ pickB }}\" title=\"Cryo\" style=\"width:26px;height:26px;border-radius:50%;border:2px solid {{ ringB }};background:#22e0ff;cursor:pointer;box-shadow:0 0 10px rgba(34,224,255,.6);padding:0;\"><\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800},&quot;accentA&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ff4d1c&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;,&quot;label&quot;:&quot;Accent A (Ignition)&quot;},&quot;accentB&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#22e0ff&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;,&quot;label&quot;:&quot;Accent B (Cryo)&quot;},&quot;motion&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Full&quot;,&quot;Reduced&quot;],&quot;default&quot;:&quot;Full&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Motion&quot;,&quot;label&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  state = { variant: 'A' };\n\n  hex2rgb(h){\n    h = (h||'').replace('#','');\n    if(h.length===3) h = h.split('').map(c=>c+c).join('');\n    const n = parseInt(h,16);\n    if(isNaN(n)) return '255,77,28';\n    return `${(n>>16)&255},${(n>>8)&255},${n&255}`;\n  }\n\n  themeVals(){\n    const aA = this.props.accentA ?? '#ff4d1c';\n    const aB = this.props.accentB ?? '#22e0ff';\n    const v = this.state.variant;\n    const neon = v==='A' ? aA : aB;\n    const neon2 = v==='A' ? '#ff9a00' : '#5b7bff';\n    return {\n      neon, neon2,\n      glow: this.hex2rgb(neon),\n      align: v==='A' ? 'center' : 'flex-start',\n      ta: v==='A' ? 'center' : 'left'\n    };\n  }\n\n  setRoot = (el) => {\n    if(el && !this._root){\n      this._root = el;\n      try { this.init(); } catch(e){ console.warn('init failed', e); }\n    }\n  };\n\n  init(){\n    const root = this._root;\n    const reduced = (this.props.motion === 'Reduced');\n    const prog = root.querySelector('[data-progress]');\n    const cur = root.querySelector('[data-cursor]');\n    const tilts = [...root.querySelectorAll('[data-tilt]')];\n    const parallax = [...root.querySelectorAll('[data-parallax]')];\n    const heroFades = [...root.querySelectorAll('[data-hero-fade]')];\n\n    // reveal (set hidden via JS so no-JS keeps content visible)\n    const reveals = [...root.querySelectorAll('[data-reveal]')];\n    reveals.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(40px)';\n      el.style.transition = 'opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1)';\n    });\n    if('IntersectionObserver' in window){\n      const io = new IntersectionObserver((ents)=>{\n        ents.forEach(e=>{\n          if(e.isIntersecting){\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.15 });\n      reveals.forEach(el => io.observe(el));\n    } else {\n      reveals.forEach(el => { el.style.opacity='1'; el.style.transform='none'; });\n    }\n\n    // product hover\n    const products = [...root.querySelectorAll('[data-product]')];\n    const subEl = root.querySelector('[data-sub]');\n    const dots = [...root.querySelectorAll('[data-dot]')];\n    const defSub = 'SELECT A COLORWAY TO BEGIN';\n    products.forEach((p,i)=>{\n      p.style.transition = 'transform .5s cubic-bezier(.2,.7,.2,1), filter .5s ease';\n      p.addEventListener('mouseenter', ()=>{\n        p.style.transform = 'translateY(-24px)';\n        p.style.filter = 'brightness(1.12)';\n        if(subEl) subEl.textContent = p.getAttribute('data-name') || defSub;\n        dots.forEach((d,di)=>{ d.style.opacity = di===i ? '1':'.35'; d.style.width = di===i ? '26px':'8px'; });\n      });\n      p.addEventListener('mouseleave', ()=>{\n        p.style.transform = '';\n        p.style.filter = '';\n        if(subEl) subEl.textContent = defSub;\n        dots.forEach(d=>{ d.style.opacity='.4'; d.style.width='8px'; });\n      });\n    });\n\n    if(reduced){\n      root.querySelectorAll('[data-anim]').forEach(el => el.style.animation = 'none');\n    } else {\n      window.addEventListener('mousemove', (e)=>{\n        if(cur) cur.style.transform = `translate(${e.clientX-150}px,${e.clientY-150}px)`;\n        for(const t of tilts){\n          const r = t.getBoundingClientRect();\n          if(r.bottom < 0 || r.top > window.innerHeight) continue;\n          const dx = (e.clientX - (r.left+r.width/2)) / r.width;\n          const dy = (e.clientY - (r.top+r.height/2)) / r.height;\n          const rx = Math.max(-1,Math.min(1,-dy)) * 9;\n          const ry = Math.max(-1,Math.min(1,dx)) * 11;\n          t.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg)`;\n        }\n      });\n    }\n\n    // scroll\n    let ticking = false;\n    const onScroll = ()=>{\n      const y = window.scrollY || window.pageYOffset || 0;\n      const h = document.documentElement.scrollHeight - window.innerHeight;\n      if(prog) prog.style.width = (h>0 ? (y/h*100) : 0) + '%';\n      if(!reduced){\n        parallax.forEach(pl=>{\n          const sp = parseFloat(pl.getAttribute('data-speed') || '0.1');\n          pl.style.marginTop = (y*sp*0.4) + 'px';\n        });\n        heroFades.forEach(hf=>{\n          hf.style.opacity = Math.max(0, 1 - y/600);\n        });\n      }\n    };\n    window.addEventListener('scroll', ()=>{\n      if(!ticking){ requestAnimationFrame(()=>{ onScroll(); ticking=false; }); ticking=true; }\n    });\n    onScroll();\n  }\n\n  renderVals(){\n    const t = this.themeVals();\n    const v = this.state.variant;\n    return {\n      ...t,\n      variant: v,\n      ringA: v==='A' ? '#ffffff' : 'transparent',\n      ringB: v==='B' ? '#ffffff' : 'transparent',\n      setRoot: this.setRoot,\n      pickA: ()=> this.setState({ variant:'A' }),\n      pickB: ()=> this.setState({ variant:'B' })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
